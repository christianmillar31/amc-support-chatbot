    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* Starfield canvas sits behind everything */
        #starfield-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* Ambient color blobs — matches christianmillar.online */
        .ambient-blob {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: -1;
        }
        .blob-purple {
            top: -20vh; left: -10vw; width: 70vw; height: 70vw;
            background: #8B5CF6; filter: blur(120px); opacity: 0.06;
        }
        .blob-rose {
            bottom: -20vh; right: -10vw; width: 60vw; height: 60vw;
            background: #F43F5E; filter: blur(120px); opacity: 0.05;
        }

        /* Grid overlay — subtle structural lines */
        .grid-overlay {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 80px 80px;
        }

        :root {
            --primary: #B91C1C;
            --primary-hover: #DC2626;
            --primary-glow: rgba(185,28,28,0.3);
            --secondary: #F43F5E;
            --purple: #8B5CF6;
            --surface: #09090B;
            --surface-raised: #18181B;
            --surface-hover: #27272A;
            --bg: #09090B;
            --border: rgba(255,255,255,0.1);
            --border-hover: rgba(255,255,255,0.2);
            --text: #FAFAFA;
            --text-secondary: #A1A1AA;
            --text-muted: #71717A;
            --success: #16A34A;
            --warning: #D97706;
            --danger: #DC2626;
            --radius: 0px;
            --radius-sm: 0px;
            --font: 'Outfit', system-ui, sans-serif;
            --mono: 'JetBrains Mono', 'Fira Code', monospace;
            /* Dramatic uses ONLY 400 and 900 — maximum contrast */
        }

        html { overflow-x: hidden; }
        ::selection { background: #8B5CF6; color: #FAFAFA; }
        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
            font-size: 16px; line-height: 1.5; font-weight: 400;
            overflow-x: hidden;
        }

        /* Header — clean, high-contrast */
        .header {
            background: var(--surface); color: var(--text);
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); flex-shrink: 0;
            position: relative; z-index: 10; /* above starfield canvas */
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .header h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .header-sub { font-size: 14px; color: var(--text-muted); }
        .new-chat-btn {
            display: flex; align-items: center; gap: 8px; padding: 8px 16px;
            background: var(--primary); color: white; border: none;
            border-radius: var(--radius-sm); font-size: 14px; font-weight: 900;
            cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .new-chat-btn:hover { background: var(--primary-hover); box-shadow: 0 0 20px var(--primary-glow); }

        /* Chat container — no scroll when only welcome is visible */
        #chat-container { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 32px 16px 0; position: relative; z-index: 1; }
        #chat-container.no-scroll { overflow: hidden; }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--surface-hover); border-radius: 2px; }

        /* Welcome — theatrical, bold, vertically centered */
        .welcome {
            max-width: 800px; margin: 0 auto; text-align: center; position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%;
        }
        .welcome-icon { width: auto; height: auto; background: transparent; border-radius: 0; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; }
        .welcome h2 {
            font-size: 80px; font-weight: 900; color: var(--text); margin-bottom: 16px;
            letter-spacing: -2px; line-height: 0.95; text-transform: uppercase;
        }
        .welcome p { font-size: 16px; color: var(--text-muted); line-height: 1.6; max-width: 460px; margin: 0 auto 40px; }
        .examples { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 560px; margin: 0 auto; }
        .example-btn {
            text-align: left; padding: 16px; background: var(--surface-raised);
            border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px;
            color: var(--text-secondary); cursor: pointer; transition: all 0.2s; line-height: 1.5;
        }
        .example-btn:hover { background: var(--surface-hover); border-color: var(--primary); box-shadow: 0 0 16px var(--primary-glow); }
        .example-label {
            display: block; font-family: var(--mono); font-size: 11px; font-weight: 400;
            color: var(--primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Messages — high contrast bubbles */
        .msg { max-width: 760px; margin: 0 auto 24px; display: flex; gap: 16px; position: relative; z-index: 1; }
        .msg-avatar {
            width: 36px; height: 36px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 900; flex-shrink: 0; margin-top: 2px;
        }
        .msg-avatar.user { background: var(--primary); color: white; }
        .msg-avatar.ai { background: var(--surface-raised); color: var(--text); border: 1px solid var(--border); }
        .msg-body { flex: 1; min-width: 0; }
        .msg-content-user {
            display: inline-block; background: var(--primary); color: white;
            border-radius: var(--radius) var(--radius) var(--radius) 4px; padding: 12px 18px;
            font-size: 16px; line-height: 1.5; font-weight: 400;
        }
        .msg-content-ai {
            background: var(--surface-raised); border: 1px solid var(--border);
            border-radius: var(--radius) var(--radius) var(--radius) 4px; padding: 24px;
            font-size: 16px; line-height: 1.65; color: #E4E4E7; position: relative;
        }
        .msg-content-ai:hover .copy-btn { opacity: 1; }

        /* Copy button */
        .copy-btn {
            position: absolute; top: 16px; right: 16px; padding: 8px;
            background: transparent; border: none; border-radius: var(--radius-sm);
            color: var(--text-muted); cursor: pointer; opacity: 0; transition: all 0.15s;
        }
        .copy-btn:hover { background: var(--surface-hover); color: var(--text); }

        /* Feedback */
        .feedback-row { display: flex; align-items: center; gap: 8px; margin-top: 16px; padding-left: 2px; }
        .feedback-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: transparent; cursor: pointer; color: var(--text-muted); transition: all 0.15s;
        }
        .feedback-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-hover); }
        .feedback-btn.active-up { background: rgba(22,163,74,0.15); color: #4ade80; border-color: rgba(22,163,74,0.3); }
        .feedback-btn.active-down { background: rgba(220,38,38,0.15); color: #f87171; border-color: rgba(220,38,38,0.3); }
        .feedback-btn:disabled { cursor: default; opacity: 0.4; }
        .feedback-comment { display: none; margin-top: 8px; gap: 8px; align-items: center; }
        .feedback-comment.show { display: flex; }
        .feedback-comment input {
            flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            font-size: 14px; font-family: inherit; outline: none; background: var(--surface-raised); color: var(--text);
        }
        .feedback-comment input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-glow); }
        .feedback-comment button {
            padding: 8px 16px; background: var(--primary); color: white;
            border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 900; cursor: pointer;
        }

        /* Sources */
        .sources { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; padding-left: 2px; }
        .source-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 12px; background: var(--surface-raised); color: var(--text-secondary);
            font-size: 12px; font-weight: 400; border-radius: 24px; transition: all 0.15s;
            border: 1px solid var(--border);
        }
        .source-tag:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-hover); }
        .source-tag svg { width: 12px; height: 12px; flex-shrink: 0; }

        /* Typing — red pulsing dots */
        .typing-body { display: flex; align-items: center; gap: 12px; padding: 16px 24px; }
        .typing-dots { display: flex; gap: 6px; }
        .typing-dot {
            width: 8px; height: 8px; background: var(--primary); border-radius: 50%;
            animation: dramatic-pulse 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        .typing-label { font-size: 14px; color: var(--text-muted); }
        @keyframes dramatic-pulse { 0%, 100% { opacity: 0.15; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

        /* Input — dramatic bottom bar */
        .input-area {
            border-top: none; background: transparent;
            padding: 16px; flex-shrink: 0; position: relative; z-index: 10;
        }
        .input-card {
            max-width: 760px; margin: 0 auto;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 16px; padding: 12px 16px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .input-top-row {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px; gap: 8px;
        }
        .input-bottom-row {
            display: flex; align-items: flex-end; gap: 8px;
        }
        .input-actions {
            display: flex; align-items: center; gap: 4px; flex-shrink: 0;
        }
        .input-icon-btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            padding: 8px; border-radius: var(--radius-sm); transition: color 0.15s;
        }
        .input-icon-btn:hover { color: var(--text); }
        .input-wrapper { max-width: 760px; margin: 0 auto; display: flex; align-items: flex-end; gap: 12px; }
        #message-input {
            flex: 1; padding: 12px 16px; border: none;
            border-radius: 8px; font-size: 16px; font-family: inherit;
            outline: none; transition: box-shadow 0.15s;
            resize: none; overflow: hidden; min-height: 44px; max-height: 160px;
            line-height: 1.5; background: transparent; color: var(--text);
        }
        #message-input::placeholder { color: var(--text-muted); }
        #message-input:focus { box-shadow: none; }
        #send-btn {
            padding: 12px 24px; background: var(--primary); color: white;
            border: none; border-radius: var(--radius); font-size: 16px; font-weight: 900;
            cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px;
            flex-shrink: 0; min-height: 48px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        #send-btn:hover { background: var(--primary-hover); box-shadow: 0 0 20px var(--primary-glow); }
        #send-btn:disabled { background: var(--surface-hover); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }
        #stop-btn {
            padding: 12px 24px; background: var(--danger); color: white;
            border: none; border-radius: var(--radius); font-size: 16px; font-weight: 900;
            cursor: pointer; transition: all 0.15s; display: none; align-items: center; gap: 8px;
            flex-shrink: 0; min-height: 48px;
        }
        #stop-btn:hover { background: #ef4444; }
        .feedback-confirm { font-size: 14px; color: #4ade80; opacity: 0; transition: opacity 0.3s; margin-left: 8px; }
        .input-footer { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 8px; }

        /* Markdown — Outfit headings at weight 900 */
        .md h1 { font-size: 24px; font-weight: 900; margin: 16px 0 8px; color: var(--text); line-height: 1.1; letter-spacing: -0.5px; }
        .md h2 { font-size: 20px; font-weight: 900; margin: 16px 0 8px; color: var(--text); line-height: 1.2; }
        .md h3 { font-size: 16px; font-weight: 900; margin: 12px 0 4px; color: var(--text-secondary); }
        .md p { margin: 8px 0; }
        .md ul, .md ol { margin: 8px 0; padding-left: 1.5rem; }
        .md li { margin: 4px 0; }
        .md strong { font-weight: 900; color: var(--text); }
        .md code {
            background: rgba(185,28,28,0.12); color: #FCA5A5; padding: 2px 6px; border-radius: 4px;
            font-size: 0.875em; font-family: var(--mono);
        }
        .md pre {
            background: var(--surface-raised); color: #D4D4D8; padding: 16px;
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            overflow-x: auto; margin: 16px 0; font-size: 14px; line-height: 1.6;
        }
        .md pre code { background: none; color: inherit; padding: 0; font-size: inherit; }
        .md table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; }
        .md th { background: var(--surface-hover); font-weight: 900; text-align: left; padding: 8px 12px; border: 1px solid var(--border); color: var(--text); }
        .md td { padding: 8px 12px; border: 1px solid var(--border); color: #D4D4D8; }
        .md tr:nth-child(even) { background: rgba(255,255,255,0.02); }
        .md blockquote { border-left: 3px solid var(--primary); padding-left: 16px; margin: 16px 0; color: var(--text-secondary); }
        .md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

        /* Troubleshooting widget */
        .ts-widget { margin-top: 16px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .ts-header {
            background: var(--surface-raised); color: var(--text); padding: 12px 16px;
            font-size: 14px; font-weight: 900; display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .ts-body { padding: 16px; background: var(--surface); }
        .ts-question { font-size: 16px; font-weight: 900; margin-bottom: 12px; color: var(--text); }
        .ts-options { display: flex; flex-direction: column; gap: 8px; }
        .ts-option {
            padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--surface-raised); cursor: pointer; font-size: 14px;
            color: var(--text-secondary); text-align: left; transition: all 0.15s;
            min-height: 44px; display: flex; align-items: center;
        }
        .ts-option:hover { border-color: var(--primary); background: rgba(185,28,28,0.08); color: #FCA5A5; box-shadow: 0 0 12px var(--primary-glow); }
        .ts-answer { font-size: 14px; line-height: 1.6; color: #D4D4D8; }
        .ts-answer strong, .ts-answer b { color: var(--text); font-weight: 900; }
        .ts-source { margin-top: 8px; font-size: 12px; color: var(--text-muted); }
        .ts-back {
            margin-top: 12px; background: transparent; border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 8px 16px; font-size: 14px;
            color: var(--text-secondary); cursor: pointer; min-height: 44px;
        }
        .ts-back:hover { background: var(--surface-hover); color: var(--text); }
        .ts-ask-ai {
            margin-top: 8px; background: var(--primary); color: white;
            border: none; border-radius: var(--radius-sm); padding: 8px 16px;
            font-size: 14px; font-weight: 900; cursor: pointer; min-height: 44px;
        }
        .ts-ask-ai:hover { background: var(--primary-hover); box-shadow: 0 0 16px var(--primary-glow); }
        .ts-breadcrumb { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }

        /* Loading skeleton */
        .skeleton-line {
            height: 16px; border-radius: var(--radius-sm);
            background: linear-gradient(90deg, var(--surface-raised) 25%, var(--surface-hover) 50%, var(--surface-raised) 75%);
            background-size: 200% 100%; animation: skeleton-shimmer 1.5s ease-in-out infinite;
        }
        .skeleton-line + .skeleton-line { margin-top: 12px; }
        .skeleton-line:nth-child(2) { width: 85%; }
        .skeleton-line:nth-child(3) { width: 70%; }
        @keyframes skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Keyboard hint */
        .input-hint { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 8px; opacity: 0.7; transition: opacity 0.5s; }
        .input-hint.hidden { opacity: 0; pointer-events: none; }

        /* Mobile */
        @media (max-width: 640px) {
            .examples { grid-template-columns: 1fr; }
            .msg { max-width: 100%; }
            .input-wrapper { max-width: 100%; }
            .header { padding: 12px 16px; }
            .header h1 { font-size: 16px; }
            .input-area { padding: 12px 12px env(safe-area-inset-bottom, 0); }
            .welcome { margin-top: 40px; }
            .welcome h2 { font-size: 48px; letter-spacing: -1px; }
            .welcome p { font-size: 14px; }
            .msg-content-ai { padding: 16px; font-size: 14px; }
            .msg-content-user { font-size: 14px; }
        }
    </style>
</head>
<body>
    <canvas id="starfield-canvas"></canvas>
    <div class="ambient-blob blob-purple"></div>
    <div class="ambient-blob blob-rose"></div>
    <div class="grid-overlay"></div>
    <div class="header">
        <div class="header-left">
            <div class="header-icon" style="background:transparent;">
                <img src="/static/amclogo.png" alt="AMC" width="36" height="36" style="object-fit:contain;">
            </div>
            <div>
                <h1>AMC Support Assistant</h1>
                <div class="header-sub">Search manuals, datasheets &amp; app notes with AI <span id="backend-badge" style="display:inline-block;padding:1px 8px;border-radius:12px;font-size:10px;font-weight:600;margin-left:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);"></span></div>
            </div>
        </div>
        <button class="new-chat-btn" onclick="newChat()">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            New Chat
        </button>
    </div>

    <div id="chat-container" class="no-scroll">
        <div class="welcome" id="welcome">
            <div class="welcome-icon" style="width:auto;height:auto;background:white;border-radius:var(--radius);padding:12px 24px;">
                <img src="/static/AMC-Logo-Long.jpg" alt="ADVANCED Motion Controls" style="max-width:320px;width:100%;height:auto;border-radius:4px;">
            </div>
            <h2 class="text-glow">How can I help?</h2>
            <p></p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-card">
            <!-- Top row: drive selector + upload pill -->
            <div class="input-top-row">
                <div id="drive-selector-bar" style="display:flex;align-items:center;gap:6px;position:relative;">
                    <span style="font-size:12px;color:var(--text-muted);flex-shrink:0;">Drive:</span>
                    <div id="drive-no-selection" style="position:relative;">
                        <input id="drive-input" type="text" placeholder="None selected"
                            autocomplete="off" spellcheck="false"
                            style="width:160px;padding:4px 10px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;font-size:12px;font-family:inherit;background:rgba(255,255,255,0.03);color:white;outline:none;">
                        <div id="drive-dropdown" style="display:none;position:absolute;bottom:calc(100% + 4px);left:0;width:280px;max-height:220px;overflow-y:auto;background:#18181B;border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-sm);z-index:100;box-shadow:0 -4px 24px rgba(0,0,0,0.8);"></div>
                    </div>
                    <div id="drive-info" style="display:none;align-items:center;gap:6px;">
                        <span style="display:inline-flex;align-items:center;gap:5px;padding:4px 8px 4px 10px;background:var(--amc-primary);color:white;border-radius:20px;font-size:12px;font-weight:500;">
                            <span id="drive-selected-sku"></span>
                            <button onclick="clearDrive()" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;" title="Clear drive">×</button>
                        </span>
                        <span style="font-size:11px;color:var(--text-secondary);"><span id="drive-family"></span> · <span id="drive-network"></span></span>
                    </div>
                </div>
                <div id="upload-pill" style="display:none;"></div>
            </div>
            <!-- Bottom row: textarea + actions -->
            <div class="input-bottom-row">
                <input type="file" id="file-input" accept=".pdf" style="display:none;" onchange="handleFileSelect(event)">
                <textarea id="message-input" rows="1" placeholder=""></textarea>
                <div class="input-actions">
                    <button id="upload-btn" onclick="document.getElementById('file-input').click()" title="Upload References" class="input-icon-btn">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                    </button>
                    <button id="send-btn" onclick="sendMessage()" aria-label="Send message">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                    <button id="stop-btn" onclick="stopStream()" aria-label="Stop response">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        let sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();
        let uploadedFile = null;  // Currently selected PDF file
        let uploadProcessed = false;  // Whether the file has been uploaded to server

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                alert('Only PDF files are accepted.');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('File too large. Maximum is 10 MB.');
                return;
            }
            uploadedFile = file;
            uploadProcessed = false;
            const pill = document.getElementById('upload-pill');
            pill.innerHTML = `<span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(255,255,255,0.08);color:#a1a1aa;border-radius:20px;font-size:12px;border:1px solid rgba(255,255,255,0.1);">
                <span>📎 ${file.name}</span>
                <button onclick="clearUpload()" style="background:none;border:none;color:#a1a1aa;cursor:pointer;font-size:14px;padding:0 2px;" title="Remove file">&times;</button>
            </span>`;
            pill.style.display = 'block';
        }

        function clearUpload() {
            uploadedFile = null;
            uploadProcessed = false;
            document.getElementById('file-input').value = '';
            document.getElementById('upload-pill').style.display = 'none';
            // Also clear from server session
            fetch('/chat/upload/' + sessionId, {method: 'DELETE'}).catch(() => {});
        }

        async function uploadPdfToServer() {
            if (!uploadedFile || uploadProcessed) return true;
            const formData = new FormData();
            formData.append('file', uploadedFile);
            formData.append('session_id', sessionId);
            try {
                const resp = await fetch('/chat/upload?session_id=' + encodeURIComponent(sessionId), {
                    method: 'POST',
                    body: formData,
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    alert('Upload failed: ' + (err.detail || 'Unknown error'));
                    return false;
                }
                const result = await resp.json();
                uploadProcessed = true;
                // Update pill with page count
                const pill = document.getElementById('upload-pill');
                pill.innerHTML = `<span style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(22,163,74,0.15);color:#4ade80;border-radius:20px;font-size:12px;border:1px solid rgba(22,163,74,0.3);">
                    <span>📎 ${result.filename} (${result.pages} pages, ${result.chunks} sections)</span>
                    <button onclick="clearUpload()" style="background:none;border:none;color:#4ade80;cursor:pointer;font-size:14px;padding:0 2px;" title="Remove file">&times;</button>
                </span>`;
                return true;
            } catch (e) {
                alert('Upload failed: ' + e.message);
                return false;
            }
        }

        marked.setOptions({ breaks: true, gfm: true });

        // Sanitize HTML to prevent XSS from LLM output
        function sanitizeHTML(html) {
            if (typeof DOMPurify !== 'undefined') {
                return DOMPurify.sanitize(html);
            }
            return html;  // Fallback if DOMPurify CDN fails to load
        }

        const MAX_RATE_LIMIT_RETRIES = 3;

        // --- Drive Selector ---
        let selectedDriveSku = sessionStorage.getItem('selectedDriveSku') || null;
        let allDrives = [];
        const driveInput = document.getElementById('drive-input');
        const driveDropdown = document.getElementById('drive-dropdown');
        const driveInfo = document.getElementById('drive-info');

        // Load drive list on startup
        fetch('/api/drives').then(r => r.json()).then(data => {
            allDrives = data.drives || [];
            if (selectedDriveSku) {
                const d = allDrives.find(d => d.sku === selectedDriveSku);
                if (d) showDriveInfo(d);
            }
        }).catch(() => {});

        // Load backend info and show badge
        fetch('/api/backend').then(r => r.json()).then(data => {
            const badge = document.getElementById('backend-badge');
            if (!badge) return;
            if (data.backend === 'ollama') {
                badge.textContent = `Ollama · ${data.model || 'local'}`;
                badge.style.background = 'rgba(22,163,74,0.15)';
                badge.style.borderColor = 'rgba(22,163,74,0.3)';
                badge.style.color = '#4ade80';
            } else {
                badge.textContent = 'Claude Sonnet';
                badge.style.background = 'rgba(185,28,28,0.15)';
                badge.style.borderColor = 'rgba(185,28,28,0.3)';
                badge.style.color = '#FCA5A5';
            }
        }).catch(() => {});

        driveInput.addEventListener('input', () => {
            const q = driveInput.value.trim().toUpperCase();
            if (q.length < 2) { driveDropdown.style.display = 'none'; return; }
            const matches = allDrives.filter(d => d.sku.includes(q)).slice(0, 15);
            if (!matches.length) { driveDropdown.style.display = 'none'; return; }
            driveDropdown.innerHTML = matches.map(d =>
                `<div onclick="selectDrive('${d.sku}')" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">
                    <span style="font-weight:600;">${d.sku}</span>
                    <span style="color:var(--text-secondary);font-size:11px;">${d.family} · ${d.network || 'Analog'}</span>
                </div>`
            ).join('');

        function getSourceUrl(source) {
            const name = source.replace('.pdf', '');
            // Datasheets → product page
            if (name.startsWith('AMC_Datasheet_')) {
                const model = name.replace('AMC_Datasheet_', '');
                return 'https://www.a-m-c.com/product/' + model.toLowerCase() + '/';
            }
            // Known docs → direct download link
            if (AMC_DOWNLOAD_LINKS[name]) {
                return AMC_DOWNLOAD_LINKS[name];
            }
            // Fallback → downloads page
            return 'https://www.a-m-c.com/downloads/';
        }

        function createSourceTags(sources) {
            const sd = document.createElement('div');
            sd.className = 'sources';
            sources.forEach(s => {
                const tag = document.createElement('a');
                tag.className = 'source-tag';
                tag.href = getSourceUrl(s.source);
                tag.target = '_blank';
                tag.rel = 'noopener';
                tag.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>' + formatSourceName(s.source) + ' p.' + s.page;
                sd.appendChild(tag);
            });
            return sd;
        }

            const contentDiv = document.createElement('div');

        function createFeedbackRow(question, answer, sources) {
            const row = document.createElement('div');
            row.className = 'feedback-row';

            const upBtn = document.createElement('button');
            upBtn.className = 'feedback-btn';
            upBtn.title = 'Good answer';
            upBtn.setAttribute('aria-label', 'Mark as good answer');
            upBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>';

            const downBtn = document.createElement('button');
            downBtn.className = 'feedback-btn';
            downBtn.title = 'Poor answer';
            downBtn.setAttribute('aria-label', 'Mark as poor answer');
            downBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 2h3a2 2 0 012 2v7a2 2 0 01-2 2h-3"/></svg>';

            const confirmSpan = document.createElement('span');
            confirmSpan.className = 'feedback-confirm';
            confirmSpan.textContent = '✓ Thanks';

            const commentBox = document.createElement('div');
            commentBox.className = 'feedback-comment';
            commentBox.innerHTML = '<input type="text" placeholder="What was wrong? (optional)" maxlength="500"><button>Send</button>';

            function sendFeedback(rating, comment = '') {
                fetch('/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, question, answer, sources, rating, comment }),
                }).then(() => {
                    confirmSpan.style.opacity = '1';
                    setTimeout(() => { confirmSpan.style.opacity = '0'; }, 2000);
                }).catch(() => {});
            }

            upBtn.onclick = () => {
                if (upBtn.classList.contains('active-up')) return;
                upBtn.classList.add('active-up');
                downBtn.classList.remove('active-down');
                commentBox.classList.remove('show');
                upBtn.disabled = true;
                downBtn.disabled = true;
                sendFeedback('up');
            };

            downBtn.onclick = () => {
                if (downBtn.classList.contains('active-down')) return;
                downBtn.classList.add('active-down');
                upBtn.classList.remove('active-up');
                commentBox.classList.add('show');
                commentBox.querySelector('input').focus();
            };

            commentBox.querySelector('button').onclick = () => {
                const comment = commentBox.querySelector('input').value.trim();
                upBtn.disabled = true;
                downBtn.disabled = true;
                commentBox.classList.remove('show');
                sendFeedback('down', comment);
            };

            // Also allow Enter to submit comment
            commentBox.querySelector('input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { commentBox.querySelector('button').click(); }
            });

            row.appendChild(upBtn);
            row.appendChild(downBtn);
            row.appendChild(confirmSpan);

            const wrapper = document.createElement('div');
            wrapper.appendChild(row);
            wrapper.appendChild(commentBox);
            return wrapper;
        }

        async function sendMessage(retryText, retryCount = 0) {
            const text = retryText || messageInput.value.trim();
            if (!text) return;

            // Upload PDF if one is selected (before sending message)
            if (uploadedFile && !uploadProcessed) {
                const uploadOk = await uploadPdfToServer();
                if (!uploadOk) return;
            }

            // Hide keyboard hint after first message
            const hint = document.getElementById('input-hint');
            if (hint) hint.classList.add('hidden');

            if (!retryText) {
                messageInput.value = '';
                messageInput.style.height = 'auto';
                addMessage('user', text);
            }
            sendBtn.disabled = true;
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'flex';
            showTyping();

            // Start elapsed timer
            const startTime = Date.now();
            const timerInterval = setInterval(() => {
                const typingEl = document.getElementById('typing');
                if (typingEl && typingEl.querySelector('.typing-label')) {
                    const elapsed = Math.round((Date.now() - startTime) / 1000);
                    const label = typingEl.querySelector('.typing-label');
                    const base = label.dataset.status || 'Searching manuals';
                    label.textContent = `${base}... (${elapsed}s)`;
                }
            }, 1000);

            currentAbort = new AbortController();

            try {
                const res = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: sessionId, drive_sku: selectedDriveSku || undefined }),
                    signal: currentAbort.signal,
                });

                if (!res.ok) {
                    clearInterval(timerInterval);
                    removeTyping();
                    if (res.status === 429) {
                        if (retryCount >= MAX_RATE_LIMIT_RETRIES) {
                            addMessage('assistant', '**Rate limited.** The AI service is busy. Please try again in a few minutes.');
                            resetInputState();
                            return;
                        }
                        let countdown = 30;
                        resetInputState();
                        const { msgEl: retryMsg, countdownSpan } = addRateLimitMessage(countdown);
                        const ci = setInterval(() => {
                            countdown--;
                            countdownSpan.textContent = countdown;
                            if (countdown <= 0) { clearInterval(ci); retryMsg.remove(); sendMessage(text, retryCount + 1); }
                        }, 1000);
                        return;
                    }
                    const err = await res.json().catch(() => ({ detail: 'Something went wrong.' }));
                    addMessage('assistant', '**Error:** ' + (err.detail || 'Something went wrong.'));
                    resetInputState();
                    return;
                }

                // Stream SSE response
                removeTyping();
                let streamAnswer = '';
                let streamSources = [];
                let msgEl = null;
                let mdDiv = null;

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line in buffer

                    let eventType = '';
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            eventType = line.slice(7).trim();
                        } else if (line.startsWith('data: ')) {
                            let data;
                            try { data = JSON.parse(line.slice(6)); } catch (e) { console.warn('SSE parse error:', e); continue; }

                            if (eventType === 'status') {
                                // Update typing indicator with status
                                const typingEl = document.getElementById('typing');
                                if (!typingEl) showTyping();
                                const label = document.querySelector('.typing-label');
                                if (label) {
                                    label.dataset.status = data.text;
                                    const elapsed = Math.round((Date.now() - startTime) / 1000);
                                    label.textContent = `${data.text} (${elapsed}s)`;
                                }
                            } else if (eventType === 'token') {
                                // Remove typing indicator on first token
                                if (!msgEl) {
                                    clearInterval(timerInterval);
                                    removeTyping();
                                    // Create AI message bubble
                                    msgEl = document.createElement('div');
                                    msgEl.className = 'msg';
                                    const avatar = document.createElement('div');
                                    avatar.className = 'msg-avatar ai';
                                    avatar.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>';
                                    const body = document.createElement('div');
                                    body.className = 'msg-body';
                                    const contentDiv = document.createElement('div');
                                    contentDiv.className = 'msg-content-ai';
                                    mdDiv = document.createElement('div');
                                    mdDiv.className = 'md';
                                    contentDiv.appendChild(mdDiv);
                                    body.appendChild(contentDiv);
                                    msgEl.appendChild(avatar);
                                    msgEl.appendChild(body);
                                    chatContainer.appendChild(msgEl);
                                }
                                streamAnswer += data.text;
                                mdDiv.appendChild(document.createTextNode(data.text));
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            } else if (eventType === 'done') {
                                streamSources = data.sources || [];
                                clearInterval(timerInterval);
                                removeTyping();
                                if (mdDiv) mdDiv.innerHTML = sanitizeHTML(marked.parse(streamAnswer));
                                // Add copy button
                                if (msgEl) {
                                    const contentDiv = msgEl.querySelector('.msg-content-ai');
                                    const copyBtn = document.createElement('button');
                                    copyBtn.className = 'copy-btn';
                                    copyBtn.title = 'Copy to clipboard';
                                    copyBtn.setAttribute('aria-label', 'Copy response to clipboard');
                                    copyBtn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>';
                                    copyBtn.onclick = () => {
                                        navigator.clipboard.writeText(streamAnswer).then(() => {
                                            copyBtn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                                            copyBtn.style.color = '#22c55e';
                                            copyBtn.style.opacity = '1';
                                            setTimeout(() => { copyBtn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>'; copyBtn.style.color = ''; copyBtn.style.opacity = ''; }, 2000);
                                        });
                                    };
                                    contentDiv.appendChild(copyBtn);
                                    // Add sources + response time badge
                                    const msgBody = msgEl.querySelector('.msg-body');
                                    const metaRow = document.createElement('div');
                                    metaRow.style.cssText = 'display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:10px;';
                                    if (streamSources.length > 0) {
                                        const sourcesDiv = createSourceTags(streamSources);
                                        // Unwrap sources into metaRow
                                        while (sourcesDiv.firstChild) metaRow.appendChild(sourcesDiv.firstChild);
                                    }
                                    // Response time badge
                                    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                                    const timeBadge = document.createElement('span');
                                    timeBadge.className = 'source-tag';
                                    timeBadge.style.cssText = 'opacity:0.6;font-variant-numeric:tabular-nums;';
                                    timeBadge.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="12" height="12"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' + elapsed + 's';
                                    metaRow.appendChild(timeBadge);
                                    msgBody.appendChild(metaRow);
                                    // Add feedback buttons
                                    msgBody.appendChild(createFeedbackRow(text, streamAnswer, streamSources));
                                    // Detect troubleshooting topic from USER's question (not AI answer)
                                    // This prevents false triggers from answer text containing generic words
                                    const tsTopic = detectTroubleshootTopic(text);
                                    if (tsTopic) {
                                        appendTroubleshootWidget(msgEl, tsTopic.id, tsTopic.tree);
                                    }
                                }
                            } else if (eventType === 'error') {
                                clearInterval(timerInterval);
                                removeTyping();
                                if (data.retry_after) {
                                    if (retryCount >= MAX_RATE_LIMIT_RETRIES) {
                                        addMessage('assistant', '**Rate limited.** The AI service is busy. Please try again in a few minutes.');
                                        resetInputState();
                                        return;
                                    }
                                    let countdown = data.retry_after;
                                    resetInputState();
                                    const { msgEl: retryMsg, countdownSpan } = addRateLimitMessage(countdown);
                                    const ci = setInterval(() => {
                                        countdown--;
                                        countdownSpan.textContent = countdown;
                                        if (countdown <= 0) { clearInterval(ci); retryMsg.remove(); sendMessage(text, retryCount + 1); }
                                    }, 1000);
                                    return;
                                }
                                addMessage('assistant', '**Error:** ' + (data.detail || 'Something went wrong.'));
                            }
                        }
                    }
                }

                // Handle incomplete stream (partial content received but no done event)
                if (msgEl && streamAnswer && !streamSources.length) {
                    if (mdDiv) mdDiv.innerHTML = sanitizeHTML(marked.parse(streamAnswer));
                    const note = document.createElement('em');
                    note.style.cssText = 'font-size:12px;color:var(--text-muted);display:block;margin-top:6px';
                    note.textContent = '(response may be incomplete)';
                    msgEl.querySelector('.msg-content-ai').appendChild(note);
                }

                // If no tokens were streamed (empty response), show fallback
                if (!msgEl && !streamAnswer) {
                    clearInterval(timerInterval);
                    removeTyping();
                    addMessage('assistant', 'No response received. Please try again.');
                }

            } catch (e) {
                clearInterval(timerInterval);
                removeTyping();
                if (e.name === 'AbortError') {
                    if (msgEl && streamAnswer) {
                        if (mdDiv) mdDiv.innerHTML = sanitizeHTML(marked.parse(streamAnswer));
                        const note = document.createElement('em');
                        note.style.cssText = 'font-size:12px;color:var(--text-muted);display:block;margin-top:6px';
                        note.textContent = '(response stopped)';
                        msgEl.querySelector('.msg-content-ai').appendChild(note);
                    } else {
                        addMessage('assistant', '*Response stopped.*');
                    }
                } else {
                    addMessage('assistant', '**Connection error:** ' + e.message);
                }
            }

            currentAbort = null;
            resetInputState();
        }

        // =====================================================================
        // Troubleshooting Decision Tree Widget
        // =====================================================================

        function detectTroubleshootTopic(answerText) {
            if (typeof TROUBLESHOOT_TREES === 'undefined') return null;
            const lower = answerText.toLowerCase();
            for (const [treeId, tree] of Object.entries(TROUBLESHOOT_TREES)) {
                if (tree.trigger_keywords.some(kw => lower.includes(kw))) {
                    return { id: treeId, tree };
                }
            }
            return null;
        }

        function appendTroubleshootWidget(msgEl, treeId, tree) {
            const body = msgEl.querySelector('.msg-body');
            if (!body) return;

            const widget = document.createElement('div');
            widget.className = 'ts-widget';
            widget.id = 'ts-' + Date.now();

            const header = document.createElement('div');
            header.className = 'ts-header';
            header.innerHTML = `<span>🔧</span> <span>Troubleshoot: ${tree.title}</span>`;
            widget.appendChild(header);

            const bodyDiv = document.createElement('div');
            bodyDiv.className = 'ts-body';
            widget.appendChild(bodyDiv);

            body.appendChild(widget);

            // Render the first question
            renderTsNode(bodyDiv, tree, tree.root, []);
        }

        function renderTsNode(container, tree, nodeId, history) {
            const node = tree.nodes[nodeId];
            if (!node) return;

            container.innerHTML = '';

            // Breadcrumb trail
            if (history.length > 0) {
                const crumb = document.createElement('div');
                crumb.className = 'ts-breadcrumb';
                crumb.textContent = history.map(h => h.label).join(' → ');
                container.appendChild(crumb);
            }

            if (node.answer) {
                // Answer node — show the diagnosis
                const ansDiv = document.createElement('div');
                ansDiv.className = 'ts-answer md';
                ansDiv.innerHTML = sanitizeHTML(marked.parse(node.answer));
                container.appendChild(ansDiv);

                if (node.source) {
                    const src = document.createElement('div');
                    src.className = 'ts-source';
                    src.textContent = '📄 Source: ' + node.source;
                    container.appendChild(src);
                }

                // "This didn't help" button
                const askBtn = document.createElement('button');
                askBtn.className = 'ts-ask-ai';
                askBtn.textContent = '💬 This didn\'t help — ask the AI';
                askBtn.onclick = () => {
                    const context = history.map(h => h.label).join(', ');
                    const prefill = `I followed the troubleshooting steps (${context}) but the issue persists. ${node.answer.substring(0, 100)}... What else can I try?`;
                    messageInput.value = prefill;
                    messageInput.focus();
                    messageInput.scrollIntoView({ behavior: 'smooth' });
                };
                container.appendChild(askBtn);

                // Back button
                if (history.length > 0) {
                    const backBtn = document.createElement('button');
                    backBtn.className = 'ts-back';
                    backBtn.textContent = '← Back';
                    backBtn.onclick = () => {
                        const prev = history.slice(0, -1);
                        const prevNodeId = prev.length > 0 ? prev[prev.length - 1].next : tree.root;
                        renderTsNode(container, tree, history.length > 1 ? history[history.length - 2].next : tree.root, prev.slice(0, -1));
                    };
                    container.appendChild(backBtn);
                }
            } else if (node.options) {
                // Question node — show options
                const q = document.createElement('div');
                q.className = 'ts-question';
                q.textContent = node.question;
                container.appendChild(q);

                const opts = document.createElement('div');
                opts.className = 'ts-options';
                node.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'ts-option';
                    btn.textContent = opt.label;
                    btn.onclick = () => {
                        const newHistory = [...history, { label: opt.label, next: opt.next }];
                        renderTsNode(container, tree, opt.next, newHistory);
                    };
                    opts.appendChild(btn);
                });
                container.appendChild(opts);

                // Back button (except on root)
                if (history.length > 0) {
                    const backBtn = document.createElement('button');
                    backBtn.className = 'ts-back';
                    backBtn.textContent = '← Back';
                    backBtn.onclick = () => {
                        const prev = history.slice(0, -1);
                        const prevNodeId = prev.length > 0 ? prev[prev.length - 1].next : tree.root;
                        renderTsNode(container, tree, prevNodeId, prev);
                    };
                    container.appendChild(backBtn);
                }
            }
        }
    </script>
    <script>
    // Dynamic starfield
    (function() {
        const canvas = document.getElementById('starfield-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, stars;
        const STAR_COUNT = 260;
        const DRIFT_SPEED = 0.15;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 1.4 + 0.4,          // radius 0.4–1.8
                    baseAlpha: Math.random() * 0.5 + 0.15,  // 0.15–0.65
                    twinkleSpeed: Math.random() * 0.008 + 0.003,
                    twinkleOffset: Math.random() * Math.PI * 2,
                    dx: (Math.random() - 0.5) * DRIFT_SPEED,
                    dy: (Math.random() - 0.5) * DRIFT_SPEED * 0.6,
                });
            }
        }

        function draw(t) {
            ctx.clearRect(0, 0, w, h);
            for (const s of stars) {
                // Drift
                s.x += s.dx;
                s.y += s.dy;
                // Wrap
                if (s.x < -2) s.x = w + 2;
                if (s.x > w + 2) s.x = -2;
                if (s.y < -2) s.y = h + 2;
                if (s.y > h + 2) s.y = -2;
                // Twinkle
                const alpha = s.baseAlpha + Math.sin(t * s.twinkleSpeed + s.twinkleOffset) * s.baseAlpha * 0.6;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${Math.max(0, Math.min(1, alpha))})`;
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        resize();
        createStars();
        requestAnimationFrame(draw);
        window.addEventListener('resize', () => { resize(); createStars(); });
    })();
    </script>
