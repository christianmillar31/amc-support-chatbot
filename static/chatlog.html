<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMC Support Chatbot — Chat Log</title>
<!-- NEOBRUTALISM chatlog styles (commented out)

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #F5F3EE; color: #1C1C1C; }

  .controls button { padding: 8px 16px; background: #1C1C1C; color: white; border: 2.5px solid #1C1C1C; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 800; box-shadow: 2px 2px 0px #1C1C1C; }

-->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', system-ui, sans-serif; background: #09090B; color: #FAFAFA; }
  .header { background: #09090B; color: #FAFAFA; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .header h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
  .header .stats { font-size: 14px; color: #71717A; }
  .header a { color: white; text-decoration: none; font-size: 14px; font-weight: 900; background: #B91C1C; padding: 8px 16px; border: none; border-radius: 8px; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px; }
  .header a:hover { background: #DC2626; box-shadow: 0 0 20px rgba(185,28,28,0.3); }
  .controls { padding: 16px 24px; background: #09090B; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls input { padding: 8px 12px; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; font-size: 14px; width: 300px; background: #18181B; color: #FAFAFA; }
  .controls input:focus { outline: none; border-color: #B91C1C; box-shadow: 0 0 0 2px rgba(185,28,28,0.3); }
  .controls button { padding: 8px 16px; background: #B91C1C; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 900; transition: all 0.15s; text-transform: uppercase; }
  .controls button:hover { background: #DC2626; }
  .controls .count { margin-left: auto; color: #71717A; font-size: 14px; }
  .summary { padding: 16px 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .summary-card { background: #18181B; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; }
  .summary-card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: #71717A; margin-bottom: 10px; }
  .summary-value { font-size: 24px; font-weight: 900; color: #FAFAFA; margin-bottom: 4px; }
  .summary-subtext { font-size: 12px; color: #A1A1AA; }
  .summary-list { display: flex; flex-direction: column; gap: 8px; }
  .summary-list-item { font-size: 13px; color: #E4E4E7; line-height: 1.4; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .summary-list-item:last-child { border-bottom: none; padding-bottom: 0; }
  .summary-meta { display: block; color: #71717A; font-size: 11px; margin-top: 2px; }
  .entries { padding: 16px 24px; display: flex; flex-direction: column; gap: 12px; }
  .entry { background: #18181B; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; }
  .entry-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: #71717A; }
  .entry-question { font-weight: 900; font-size: 15px; margin-bottom: 8px; color: #FAFAFA; }
  .entry-answer { font-size: 14px; color: #A1A1AA; line-height: 1.5; max-height: 200px; overflow: hidden; position: relative; }
  .entry-answer.expanded { max-height: none; }
  .entry-answer:not(.expanded)::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(transparent, #18181B); }
  .toggle-btn { background: none; border: none; color: #B91C1C; cursor: pointer; font-size: 13px; margin-top: 4px; padding: 0; font-weight: 900; }
  .toggle-btn:hover { color: #DC2626; }
  .sources { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .source-tag { font-size: 11px; background: #18181B; color: #A1A1AA; padding: 2px 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
  .empty { text-align: center; padding: 60px; color: #71717A; }
  @media (max-width: 640px) { .controls input { width: 100%; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Chat Log Dashboard</h1>
    <div class="stats" id="stats">Loading...</div>
  </div>
  <a href="/">Back to Chatbot</a>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search questions or answers..." oninput="filterEntries()">
  <button onclick="refreshLog()">Refresh</button>
  <div class="count" id="count"></div>
</div>

<div class="summary" id="summary">
  <div class="summary-card"><h3>Loading</h3><div class="summary-subtext">Preparing telemetry...</div></div>
</div>

<div class="entries" id="entries">
  <div class="empty">Loading chat log...</div>
</div>

<script>
let allEntries = [];

async function loadLog() {
  try {
    const res = await fetch('/api/chatlog');
    const data = await res.json();
    allEntries = (data.entries || []).reverse(); // newest first
    const ups = allEntries.filter(e => e.rating === 'up').length;
    const downs = allEntries.filter(e => e.rating === 'down').length;
    const ratingText = (ups || downs) ? ` | ${ups} good, ${downs} bad` : '';
    document.getElementById('stats').textContent =
      `${data.total} conversations${ratingText}`;
    renderSummary(data.summary || {});
    renderEntries(allEntries);
  } catch (e) {
    document.getElementById('summary').innerHTML =
      '<div class="summary-card"><h3>Telemetry</h3><div class="summary-subtext">Failed to load request metrics.</div></div>';
    document.getElementById('entries').innerHTML =
      '<div class="empty">Failed to load chat log.</div>';
  }
}

function renderSummary(summary) {
  const topList = (items, render) => {
    if (!items || !items.length) return '<div class="summary-subtext">No data yet.</div>';
    return `<div class="summary-list">${items.map(render).join('')}</div>`;
  };

  const summaryHtml = `
    <div class="summary-card">
      <h3>Today</h3>
      <div class="summary-value">$${Number(summary.today_cost_usd || 0).toFixed(3)}</div>
      <div class="summary-subtext">${summary.today_requests || 0} requests today</div>
      <div class="summary-subtext">Avg latency: ${Math.round(summary.today_avg_latency_ms || 0)} ms</div>
    </div>
    <div class="summary-card">
      <h3>Most Expensive</h3>
      ${topList(summary.most_expensive, item => `
        <div class="summary-list-item">
          ${escapeHtml((item.question || '').slice(0, 90) || 'Unknown question')}
          <span class="summary-meta">$${Number(item.value || 0).toFixed(4)}</span>
        </div>
      `)}
    </div>
    <div class="summary-card">
      <h3>Highest Latency</h3>
      ${topList(summary.highest_latency, item => `
        <div class="summary-list-item">
          ${escapeHtml((item.question || '').slice(0, 90) || 'Unknown question')}
          <span class="summary-meta">${Number(item.value || 0).toLocaleString()} ms</span>
        </div>
      `)}
    </div>
    <div class="summary-card">
      <h3>Common SKUs</h3>
      ${topList(summary.common_skus, item => `
        <div class="summary-list-item">
          ${escapeHtml(item.sku || 'Unknown SKU')}
          <span class="summary-meta">${item.count || 0} requests</span>
        </div>
      `)}
    </div>
    <div class="summary-card">
      <h3>Common Questions</h3>
      ${topList(summary.common_questions, item => `
        <div class="summary-list-item">
          ${escapeHtml((item.question || '').slice(0, 90) || 'Unknown question')}
          <span class="summary-meta">${item.count || 0} repeats</span>
        </div>
      `)}
    </div>
    <div class="summary-card">
      <h3>Broad / Fallback</h3>
      ${topList(summary.broad_retrieval_or_fallback, item => `
        <div class="summary-list-item">
          ${escapeHtml((item.question || '').slice(0, 90) || 'Unknown question')}
          <span class="summary-meta">
            chunks=${item.retrieval_chunk_count || 0}
            ${item.used_fallback ? ' | fallback' : ''}
            ${item.broad_retrieval ? ' | broad retrieval' : ''}
            ${item.support_bucket ? ' | ' + escapeHtml(item.support_bucket) : ''}
          </span>
        </div>
      `)}
    </div>
  `;

  document.getElementById('summary').innerHTML = summaryHtml;
}

function renderEntries(entries) {
  const container = document.getElementById('entries');
  document.getElementById('count').textContent = `Showing ${entries.length} entries`;

  if (!entries.length) {
    container.innerHTML = '<div class="empty">No chat entries yet. Ask a question in the chatbot to see it here.</div>';
    return;
  }

  container.innerHTML = entries.map((e, i) => {
    const time = new Date(e.timestamp).toLocaleString();
    const sources = (e.sources || []).map(s =>
      `<span class="source-tag">${s.source}${s.page ? ' p.' + s.page : ''}</span>`
    ).join('');
    const answerPreview = e.answer || 'No answer';

    const ratingBadge = e.rating === 'up' ? '<span style="background:rgba(22,163,74,0.15);color:#4ade80;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;border:1px solid rgba(22,163,74,0.3);">&#x1F44D; Good</span>'
      : e.rating === 'down' ? '<span style="background:rgba(220,38,38,0.15);color:#f87171;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;border:1px solid rgba(220,38,38,0.3);">&#x1F44E; Bad</span>'
      : '<span style="background:rgba(255,255,255,0.05);color:#71717a;padding:2px 8px;border-radius:12px;font-size:11px;border:1px solid rgba(255,255,255,0.08);">No rating</span>';

    return `
      <div class="entry" style="${e.rating === 'down' ? 'border-left:3px solid rgba(220,38,38,0.5);' : e.rating === 'up' ? 'border-left:3px solid rgba(22,163,74,0.5);' : ''}">
        <div class="entry-header">
          <span>${time} ${ratingBadge}</span>
          <span>Session: ${e.session_id?.substring(0, 8) || 'unknown'}...</span>
        </div>
        <div class="entry-question">${escapeHtml(e.question)}</div>
        <div class="entry-answer" id="answer-${i}">${escapeHtml(answerPreview)}</div>
        <button class="toggle-btn" onclick="toggleAnswer(${i})">Show more</button>
        ${sources ? `<div class="sources">${sources}</div>` : ''}
      </div>
    `;
  }).join('');
}

function toggleAnswer(i) {
  const el = document.getElementById('answer-' + i);
  el.classList.toggle('expanded');
  const btn = el.nextElementSibling;
  btn.textContent = el.classList.contains('expanded') ? 'Show less' : 'Show more';
}

function filterEntries() {
  const q = document.getElementById('search').value.toLowerCase();
  if (!q) { renderEntries(allEntries); return; }
  const filtered = allEntries.filter(e =>
    (e.question || '').toLowerCase().includes(q) ||
    (e.answer || '').toLowerCase().includes(q)
  );
  renderEntries(filtered);
}

function refreshLog() { loadLog(); }

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

loadLog();
</script>
</body>
</html>
