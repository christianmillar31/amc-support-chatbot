<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMC Support Chatbot — Chat Log</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; }
  .header { background: #1e3a5f; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .stats { font-size: 14px; opacity: 0.8; }
  .header a { color: #93c5fd; text-decoration: none; font-size: 14px; }
  .controls { padding: 16px 24px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls input { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; width: 300px; }
  .controls button { padding: 8px 16px; background: #1e3a5f; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .controls button:hover { background: #2563eb; }
  .controls .count { margin-left: auto; color: #64748b; font-size: 14px; }
  .entries { padding: 16px 24px; display: flex; flex-direction: column; gap: 12px; }
  .entry { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; }
  .entry-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: #64748b; }
  .entry-question { font-weight: 600; font-size: 15px; margin-bottom: 8px; color: #1e3a5f; }
  .entry-answer { font-size: 14px; color: #334155; line-height: 1.5; max-height: 200px; overflow: hidden; position: relative; }
  .entry-answer.expanded { max-height: none; }
  .entry-answer:not(.expanded)::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(transparent, white); }
  .toggle-btn { background: none; border: none; color: #2563eb; cursor: pointer; font-size: 13px; margin-top: 4px; padding: 0; }
  .sources { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .source-tag { font-size: 11px; background: #f1f5f9; color: #64748b; padding: 2px 8px; border-radius: 12px; }
  .empty { text-align: center; padding: 60px; color: #94a3b8; }
  @media (max-width: 640px) { .controls input { width: 100%; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Chat Log Dashboard</h1>
    <div class="stats" id="stats">Loading...</div>
  </div>
  <a href="/">Back to Chatbot</a>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search questions or answers..." oninput="filterEntries()">
  <button onclick="refreshLog()">Refresh</button>
  <div class="count" id="count"></div>
</div>

<div class="entries" id="entries">
  <div class="empty">Loading chat log...</div>
</div>

<script>
let allEntries = [];

async function loadLog() {
  try {
    const res = await fetch('/api/chatlog');
    const data = await res.json();
    allEntries = (data.entries || []).reverse(); // newest first
    const ups = allEntries.filter(e => e.rating === 'up').length;
    const downs = allEntries.filter(e => e.rating === 'down').length;
    const ratingText = (ups || downs) ? ` | ${ups} good, ${downs} bad` : '';
    document.getElementById('stats').textContent =
      `${data.total} conversations${ratingText}`;
    renderEntries(allEntries);
  } catch (e) {
    document.getElementById('entries').innerHTML =
      '<div class="empty">Failed to load chat log.</div>';
  }
}

function renderEntries(entries) {
  const container = document.getElementById('entries');
  document.getElementById('count').textContent = `Showing ${entries.length} entries`;

  if (!entries.length) {
    container.innerHTML = '<div class="empty">No chat entries yet. Ask a question in the chatbot to see it here.</div>';
    return;
  }

  container.innerHTML = entries.map((e, i) => {
    const time = new Date(e.timestamp).toLocaleString();
    const sources = (e.sources || []).map(s =>
      `<span class="source-tag">${s.source}${s.page ? ' p.' + s.page : ''}</span>`
    ).join('');
    const answerPreview = e.answer || 'No answer';

    const ratingBadge = e.rating === 'up' ? '<span style="background:#22c55e;color:white;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;">&#x1F44D; Good</span>'
      : e.rating === 'down' ? '<span style="background:#ef4444;color:white;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;">&#x1F44E; Bad</span>'
      : '<span style="background:#94a3b8;color:white;padding:2px 8px;border-radius:12px;font-size:11px;">No rating</span>';

    return `
      <div class="entry" style="${e.rating === 'down' ? 'border-left:3px solid #ef4444;' : e.rating === 'up' ? 'border-left:3px solid #22c55e;' : ''}">
        <div class="entry-header">
          <span>${time} ${ratingBadge}</span>
          <span>Session: ${e.session_id?.substring(0, 8) || 'unknown'}...</span>
        </div>
        <div class="entry-question">${escapeHtml(e.question)}</div>
        <div class="entry-answer" id="answer-${i}">${escapeHtml(answerPreview)}</div>
        <button class="toggle-btn" onclick="toggleAnswer(${i})">Show more</button>
        ${sources ? `<div class="sources">${sources}</div>` : ''}
      </div>
    `;
  }).join('');
}

function toggleAnswer(i) {
  const el = document.getElementById('answer-' + i);
  el.classList.toggle('expanded');
  const btn = el.nextElementSibling;
  btn.textContent = el.classList.contains('expanded') ? 'Show less' : 'Show more';
}

function filterEntries() {
  const q = document.getElementById('search').value.toLowerCase();
  if (!q) { renderEntries(allEntries); return; }
  const filtered = allEntries.filter(e =>
    (e.question || '').toLowerCase().includes(q) ||
    (e.answer || '').toLowerCase().includes(q)
  );
  renderEntries(filtered);
}

function refreshLog() { loadLog(); }

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

loadLog();
</script>
</body>
</html>
